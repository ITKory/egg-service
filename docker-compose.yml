version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: chaos-egg-redis
    ports:
      - "16379:6379" 
    volumes:
      - redis-data:/data
    networks:
      - app-network

  backend:
    build: .
    container_name: chaos-egg-backend
    ports:
      - "48080:8080"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    networks:
      - app-network

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge